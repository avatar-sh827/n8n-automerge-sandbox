name: Auto-Merge Security PRs
on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to auto-merge'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  evaluate-pr:
    name: Evaluate PR
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.actor == 'github-actions[bot]' ||
      github.actor == 'dependabot[bot]'
    outputs:
      should_merge: ${{ steps.evaluate.outputs.should_merge }}
      pr_number: ${{ steps.get-pr.outputs.number }}
      pr_title: ${{ steps.get-pr.outputs.title }}
    steps:
      - name: Get PR information
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            let pr;
            if (context.eventName === 'workflow_dispatch') {
              const prNumber = parseInt('${{ github.event.inputs.pr_number || 0 }}');
              pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              pr = pr.data;
            } else if (context.payload.pull_request) {
              pr = context.payload.pull_request;
            }
            if (!pr) {
              core.setOutput('number', '');
              core.setOutput('title', '');
              return;
            }
            core.setOutput('number', pr.number.toString());
            core.setOutput('title', pr.title);
            core.setOutput('author', pr.user.login);
            core.setOutput('base', pr.base.ref);
            core.setOutput('labels', pr.labels.map(l => l.name).join(','));
            console.log(`PR #${pr.number}: ${pr.title}`);

      - name: Evaluate criteria
        id: evaluate
        if: steps.get-pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.get-pr.outputs.number }}');
            const author = '${{ steps.get-pr.outputs.author }}';
            const base = '${{ steps.get-pr.outputs.base }}';
            const labelsStr = '${{ steps.get-pr.outputs.labels }}';
            const labels = labelsStr ? labelsStr.split(',') : [];
            // For sandbox: skip bot check on workflow_dispatch
            const isDispatch = '${{ github.event_name }}' === 'workflow_dispatch';
            const isBot = isDispatch || author === 'github-actions[bot]';
            const hasAutomatedLabel = isDispatch || labels.includes('automated');
            const hasSecurityLabel = isDispatch || labels.includes('security');
            const isTargetBranch = base === 'master';
            const shouldMerge = isBot && hasAutomatedLabel && hasSecurityLabel && isTargetBranch;
            core.setOutput('should_merge', shouldMerge.toString());
            console.log(`should_merge: ${shouldMerge}`);

  auto-merge:
    name: Auto-Merge PR
    runs-on: ubuntu-latest
    needs: evaluate-pr
    if: needs.evaluate-pr.outputs.should_merge == 'true'
    steps:
      - name: Merge PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ needs.evaluate-pr.outputs.pr_number }}');
            try {
              const result = await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: '${{ needs.evaluate-pr.outputs.pr_title }}',
                commit_message: `Auto-merged by security workflow\n\nPR: #${prNumber}`
              });
              console.log('PR merged successfully');
            } catch (error) {
              console.error('Merge error:', error.message);
            }
